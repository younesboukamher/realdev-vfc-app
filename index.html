<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><!-- v12d -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#111318">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RealDev Vilvoorde</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===========================================
   RealDev Vilvoorde — v5 CLARITY DESIGN SYSTEM
   
   Principes UX (équipe de 4) :
   ✓ Une action principale par écran
   ✓ Progressive disclosure — montrer l'essentiel
   ✓ Thumb-friendly — zones de tap 48px min
   ✓ Feedback immédiat sur chaque action
   ✓ Hiérarchie claire — 3 niveaux max
   ✓ Langage humain partout
   =========================================== */

/* ── TOKENS ── */
:root {
  /* Couleurs système */
  --ink:       #111318;      /* fond principal */
  --ink2:      #1C1F26;      /* surfaces */
  --ink3:      #252930;      /* cards */
  --ink4:      #2F333C;      /* éléments interactifs */

  /* Texte */
  --tx1: #FFFFFF;
  --tx2: rgba(255,255,255,.75);
  --tx3: rgba(255,255,255,.45);
  --tx4: rgba(255,255,255,.25);

  /* Séparateurs */
  --sep: rgba(255,255,255,.08);
  --sep2:rgba(255,255,255,.13);

  /* Couleur principale - Vert succès */
  --brand:     #22C55E;
  --brand-dim: rgba(34,197,94,.14);
  --brand-glow:rgba(34,197,94,.28);

  /* Couleurs sémantiques */
  --danger:    #EF4444;
  --danger-dim:rgba(239,68,68,.12);
  --warn:      #F59E0B;
  --warn-dim:  rgba(245,158,11,.12);
  --info:      #3B82F6;
  --info-dim:  rgba(59,130,246,.12);

  /* Typographie */
  --font: 'Inter', -apple-system, sans-serif;

  /* Espacements */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;

  /* Layout */
  --topbar-h: 56px;
  --navbar-h: 72px;
  --safe-b: env(safe-area-inset-bottom, 0px);

  /* Rayons */
  --r-sm:  8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-full: 9999px;
}

/* ── RESET ── */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html { height: 100%; overflow-x: hidden; }
body {
  font-family: var(--font);
  background: var(--ink);
  color: var(--tx2);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── UTILITY ── */
.sr-only { position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0); }
.flex { display:flex; } .flex-col { flex-direction:column; }
.items-center { align-items:center; } .justify-between { justify-content:space-between; }
.gap-2 { gap:8px; } .gap-3 { gap:12px; }
.flex-1 { flex:1; } .shrink-0 { flex-shrink:0; }
.w-full { width:100%; } .text-center { text-align:center; }
.truncate { overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }

/* ── SYSTÈME ── */
#offline-bar {
  display:none; position:fixed; top:0; left:0; right:0; z-index:9999;
  background:var(--warn); color:#1a0a00;
  font:600 12px/1 var(--font); text-align:center; padding:10px;
}
body.offline #offline-bar { display:block; }

#splash {
  display:none; position:fixed; inset:0; z-index:9000;
  background:var(--ink); flex-direction:column;
  align-items:center; justify-content:center; gap:20px;
}
#splash.on { display:flex; }
.splash-logo {
  font:800 28px/1 var(--font); color:var(--tx1);
  letter-spacing:-1px;
}
.splash-logo span { color:var(--brand); }
.splash-bar {
  width:80px; height:2px; background:var(--sep2);
  border-radius:1px; overflow:hidden;
}
.splash-bar::after {
  content:''; display:block; height:100%;
  background:var(--brand); border-radius:1px;
  animation:splashAnim 1.8s ease infinite;
}
@keyframes splashAnim {
  0%{transform:translateX(-100%)} 50%{transform:translateX(0)} 100%{transform:translateX(100%)}
}

#toast {
  position:fixed; bottom:calc(var(--navbar-h) + var(--safe-b) + 16px); left:50%;
  transform:translateX(-50%) translateY(4px);
  background:var(--ink4); border:1px solid var(--sep2); color:var(--tx1);
  font:500 13px/1 var(--font); padding:11px 20px; border-radius:var(--r-full);
  z-index:8000; opacity:0; white-space:nowrap;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ══════════════════════════════════════
   LOGIN — Simple, accueillant, clair
══════════════════════════════════════ */
#scr-login {
  position:fixed; inset:0; z-index:5000;
  background:var(--ink);
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-end;
  padding:0 24px calc(var(--safe-b) + 40px);
}

.login-hero {
  position:absolute; top:0; left:0; right:0; bottom:50%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
}

/* Terrain de futsal stylisé en SVG inline */
.login-pitch {
  width:140px; height:100px; opacity:.08;
  border:2px solid var(--tx1); border-radius:4px; position:relative;
}
.login-pitch::before {
  content:''; position:absolute; inset:0; margin:auto;
  width:2px; height:100%; background:var(--tx1);
}
.login-pitch::after {
  content:''; position:absolute; inset:0; margin:auto;
  width:48px; height:48px; border:2px solid var(--tx1);
  border-radius:50%;
}

.login-club {
  text-align:center; padding-bottom:8px;
}
.login-badge {
  width:64px; height:64px; background:var(--brand-dim);
  border:2px solid var(--brand);
  border-radius:18px; font-size:30px;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 14px;
}
.login-name {
  font:800 28px/1 var(--font); color:var(--tx1);
  letter-spacing:-1px;
}
.login-sub {
  font:500 13px/1.3 var(--font); color:var(--brand);
  letter-spacing:.3px; margin-top:4px;
}
.login-div {
  font:400 11px/1 var(--font); color:var(--tx3);
  margin-top:4px; text-transform:uppercase; letter-spacing:1px;
}

/* Bas de page login */
.login-bottom {
  width:100%; max-width:400px;
}

.login-langs {
  display:flex; gap:6px; justify-content:center; margin-bottom:24px;
}
.lang-btn {
  background:transparent; border:1px solid var(--sep2);
  color:var(--tx3); font:600 12px/1 var(--font);
  padding:7px 18px; border-radius:var(--r-full); cursor:pointer;
  transition:all .15s;
}
.lang-btn.on { border-color:var(--brand); color:var(--brand); background:var(--brand-dim); }

.login-card {
  background:var(--ink2); border:1px solid var(--sep2);
  border-radius:var(--r-xl); padding:24px;
}

.field-label {
  font:600 12px/1 var(--font); color:var(--tx3);
  text-transform:uppercase; letter-spacing:.8px;
  display:block; margin-bottom:8px;
}
.field-input {
  width:100%; background:var(--ink3);
  border:1.5px solid var(--sep2); border-radius:var(--r-md);
  color:var(--tx1); font:400 16px/1 var(--font);
  padding:14px 16px; outline:none; margin-bottom:14px;
  transition:border-color .15s, box-shadow .15s;
  -webkit-appearance:none;
}
.field-input:focus {
  border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-dim);
}
.field-input::placeholder { color:var(--tx4); }

.login-err {
  color:var(--danger); font:500 13px/1.4 var(--font);
  margin-bottom:12px; min-height:18px;
}

.btn-main {
  width:100%; background:var(--brand); border:none;
  color:#fff; font:700 16px/1 var(--font);
  padding:17px; border-radius:var(--r-md); cursor:pointer;
  transition:all .15s; box-shadow:0 4px 20px var(--brand-glow);
}
.btn-main:hover { filter:brightness(1.08); }
.btn-main:active { transform:scale(.98); }
.btn-main:disabled { opacity:.6; cursor:not-allowed; transform:none; }

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
#app {
  display:none;
  min-height:100dvh;
}

/* ── Topbar ── */
.topbar {
  position:fixed; top:0; left:0; right:0;
  height:var(--topbar-h); z-index:200;
  background:rgba(17,19,24,.92);
  border-bottom:1px solid var(--sep);
  backdrop-filter:blur(16px);
  display:flex; align-items:center; padding:0 18px;
}
.topbar-left { flex:1; display:flex; align-items:center; gap:10px; }
.topbar-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--brand); box-shadow:0 0 8px var(--brand);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
.topbar-title {
  font:700 16px/1 var(--font); color:var(--tx1); letter-spacing:-.3px;
}
.topbar-title b { color:var(--brand); }
.topbar-page {
  font:500 10px/1 var(--font); color:var(--tx3);
  text-transform:uppercase; letter-spacing:1px; margin-top:3px;
}
.topbar-right { display:flex; align-items:center; gap:6px; }
.top-badge {
  font:700 9px/1 var(--font); text-transform:uppercase; letter-spacing:1px;
  padding:4px 9px; border-radius:4px;
  background:var(--brand-dim); border:1px solid var(--brand); color:var(--brand);
}
.top-lang {
  background:transparent; border:1px solid var(--sep2); color:var(--tx3);
  font:600 10px/1 var(--font); padding:5px 10px; border-radius:var(--r-sm);
  cursor:pointer; transition:all .12s;
}
.top-lang:hover { border-color:var(--brand); color:var(--brand); }
.top-exit {
  width:34px; height:34px; background:var(--ink3);
  border:1px solid var(--sep2); color:var(--tx3);
  border-radius:var(--r-sm); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; transition:all .12s;
}
.top-exit:hover { border-color:var(--danger); color:var(--danger); }

/* ── Main content ── */
.main {
  padding-top:var(--topbar-h);
  padding-bottom:calc(var(--navbar-h) + var(--safe-b));
}

/* ── Bottom navbar ── */
.navbar {
  position:fixed; bottom:0; left:0; right:0;
  height:calc(var(--navbar-h) + var(--safe-b));
  background:rgba(17,19,24,.96);
  border-top:1px solid var(--sep2);
  backdrop-filter:blur(20px);
  display:flex; align-items:flex-start;
  justify-content:space-around;
  padding:10px 8px 0;
  z-index:200;
}
.nb-tab {
  flex:1; background:none; border:none;
  display:flex; flex-direction:column;
  align-items:center; gap:4px;
  padding:6px 4px; cursor:pointer;
  position:relative; min-height:52px;
  transition:color .15s;
  color:var(--tx3);
}
.nb-tab.on { color:var(--brand); }
.nb-icon {
  width:36px; height:28px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; transition:all .18s;
}
.nb-tab.on .nb-icon { background:var(--brand-dim); }
.nb-tab::before {
  content:''; position:absolute; top:0; left:50%;
  transform:translateX(-50%);
  width:0; height:3px; background:var(--brand);
  border-radius:0 0 4px 4px; transition:width .2s ease;
}
.nb-tab.on::before { width:22px; }
.nb-label {
  font:600 9px/1 var(--font); text-transform:uppercase;
  letter-spacing:.5px;
}

/* ── Pages ── */
.pg { display:none; animation:pgIn .18s ease; }
.pg.on { display:block; }
@keyframes pgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* ══════════════════════════════════════
   COMPOSANTS PARTAGÉS
══════════════════════════════════════ */

/* Section header */
.sec {
  padding:20px 18px 10px;
  display:flex; align-items:center; justify-content:space-between;
}
.sec-title {
  font:700 18px/1 var(--font); color:var(--tx1); letter-spacing:-.4px;
}
.sec-action {
  font:600 13px/1 var(--font); color:var(--brand);
  background:none; border:none; cursor:pointer; padding:4px 0;
}

/* Divider */
.div { height:1px; background:var(--sep); margin:0 18px; }

/* ── Boutons ── */
.btn {
  border:1.5px solid var(--sep2); background:var(--ink3);
  color:var(--tx2); font:600 14px/1 var(--font);
  padding:12px 18px; border-radius:var(--r-md); cursor:pointer;
  transition:all .14s; text-align:center;
}
.btn:active { transform:scale(.97); }
.btn-green {
  background:var(--brand); border-color:var(--brand);
  color:#fff; box-shadow:0 2px 16px var(--brand-glow);
}
.btn-green:hover { filter:brightness(1.05); }
.btn-outline { background:transparent; }
.btn-outline:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-dim); }
.btn-danger { border-color:var(--danger); color:var(--danger); }
.btn-danger:hover { background:var(--danger-dim); }
.btn-block { width:100%; }
.btn-row { display:flex; gap:8px; }
.btn-sm { padding:8px 14px; font-size:12px; }

/* ── Chips / Badges ── */
.chip {
  display:inline-flex; align-items:center;
  font:600 10px/1 var(--font); text-transform:uppercase;
  letter-spacing:.8px; padding:4px 10px; border-radius:4px; border:1px solid;
}
.chip-green  { background:var(--brand-dim); border-color:rgba(34,197,94,.3); color:var(--brand); }
.chip-red    { background:var(--danger-dim); border-color:rgba(239,68,68,.3); color:var(--danger); }
.chip-amber  { background:var(--warn-dim); border-color:rgba(245,158,11,.3); color:var(--warn); }
.chip-blue   { background:var(--info-dim); border-color:rgba(59,130,246,.3); color:var(--info); }
.chip-muted  { background:rgba(255,255,255,.04); border-color:var(--sep2); color:var(--tx3); }

/* ── Avatar joueur ── */
.av {
  width:40px; height:40px; border-radius:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font:700 13px/1 var(--font); text-transform:uppercase;
}
.av-gk  { background:rgba(245,158,11,.15); color:var(--warn); }
.av-fix { background:rgba(59,130,246,.15);  color:var(--info); }
.av-ala { background:rgba(34,197,94,.15);   color:var(--brand); }
.av-piv { background:rgba(239,68,68,.15);   color:var(--danger); }
.av-sm  { width:32px; height:32px; border-radius:8px; font-size:11px; }
.av-lg  { width:52px; height:52px; border-radius:16px; font-size:18px; }

/* ── Champs formulaire ── */
.fl { font:600 11px/1 var(--font); color:var(--tx3); text-transform:uppercase; letter-spacing:.8px; display:block; margin-bottom:7px; }
.fi, .fs {
  width:100%; background:var(--ink3);
  border:1.5px solid var(--sep2); border-radius:var(--r-md);
  color:var(--tx1); font:400 15px/1 var(--font);
  padding:12px 14px; outline:none;
  transition:border-color .15s, box-shadow .15s;
  -webkit-appearance:none;
}
.fi:focus, .fs:focus { border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-dim); }
.fi::placeholder { color:var(--tx4); }
textarea.fi { resize:vertical; min-height:72px; line-height:1.5; }
.fg { margin-bottom:14px; }
.fg2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* ── Tabs ── */
.tabs {
  display:flex; border-bottom:1px solid var(--sep);
  overflow-x:auto; scrollbar-width:none; padding:0 18px;
}
.tabs::-webkit-scrollbar { display:none; }
.tab-btn {
  background:none; border:none; border-bottom:2px solid transparent;
  color:var(--tx3); font:600 13px/1 var(--font);
  padding:12px 14px; cursor:pointer; white-space:nowrap; flex-shrink:0;
  transition:all .15s; margin-bottom:-1px;
}
.tab-btn.on { color:var(--brand); border-bottom-color:var(--brand); }
.tab-pane { display:none; }
.tab-pane.on { display:block; }

/* ══════════════════════════════════════
   ÉCRAN ACCUEIL — Dashboard clair
   Une info principale, accès rapide
══════════════════════════════════════ */

/* Prochain match — card hero */
.match-hero {
  margin:12px 18px;
  background:linear-gradient(135deg, #1a2e1f, #1c2c24);
  border:1px solid rgba(34,197,94,.2); border-radius:var(--r-xl);
  padding:20px; position:relative; overflow:hidden;
}
.match-hero::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:1px; background:linear-gradient(90deg, var(--brand), transparent);
}
.match-tag {
  font:600 10px/1 var(--font); text-transform:uppercase;
  letter-spacing:1.2px; color:var(--brand); margin-bottom:14px;
  display:flex; align-items:center; gap:7px;
}
.match-tag-dot {
  width:5px; height:5px; background:var(--brand);
  border-radius:50%; box-shadow:0 0 6px var(--brand);
  animation:pulse 2s infinite;
}
.match-teams {
  display:flex; align-items:center;
  justify-content:space-between; gap:8px;
  margin-bottom:14px;
}
.match-team-name {
  font:700 17px/1.2 var(--font); color:var(--tx1); flex:1;
  letter-spacing:-.3px;
}
.match-team-name.home { color:var(--brand); }
.match-sep { font:700 18px/1 var(--font); color:var(--tx4); flex-shrink:0; }
.match-score-big {
  font:800 36px/1 var(--font); letter-spacing:-2px; flex-shrink:0;
}
.match-score-big.w { color:var(--brand); }
.match-score-big.d { color:var(--warn); }
.match-score-big.l { color:var(--danger); }
.match-infos {
  display:flex; gap:10px; flex-wrap:wrap; align-items:center;
}
.match-info-item {
  font:500 12px/1 var(--font); color:var(--tx3);
  display:flex; align-items:center; gap:4px;
}
.match-countdown {
  font:700 20px/1 var(--font); color:var(--brand);
  margin-top:10px; letter-spacing:-.5px;
}
.match-absents {
  margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,.06);
}
.match-absents-title {
  font:600 10px/1 var(--font); color:var(--danger);
  text-transform:uppercase; letter-spacing:1px; margin-bottom:7px;
}
.absent-pill {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--danger-dim); border:1px solid rgba(239,68,68,.2);
  color:var(--danger); font:500 11px/1 var(--font);
  padding:4px 10px; border-radius:var(--r-full); margin:2px;
}

/* Stats rapides — bande horizontale */
.quick-stats {
  display:grid; grid-template-columns:repeat(4,1fr);
  margin:0 18px 4px; gap:8px;
}
.qs-cell {
  background:var(--ink2); border:1px solid var(--sep);
  border-radius:var(--r-md); padding:12px 10px; text-align:center;
}
.qs-num {
  font:700 22px/1 var(--font); color:var(--tx1); letter-spacing:-.5px;
}
.qs-lbl {
  font:500 9px/1 var(--font); color:var(--tx3);
  text-transform:uppercase; letter-spacing:.8px; margin-top:4px;
}

/* Résultats récents */
.result-list { padding:0 18px; }
.result-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 0; border-bottom:1px solid var(--sep);
}
.result-item:last-child { border-bottom:none; }
.result-bar { width:3px; height:36px; border-radius:2px; flex-shrink:0; }
.result-bar.w { background:var(--brand); }
.result-bar.d { background:var(--warn); }
.result-bar.l { background:var(--danger); }
.result-bar.n { background:var(--info); }
.result-info { flex:1; min-width:0; }
.result-teams { font:600 14px/1.2 var(--font); color:var(--tx1); }
.result-meta  { font:400 11px/1 var(--font); color:var(--tx3); margin-top:3px; }
.result-scorers { font:400 11px/1 var(--font); color:var(--tx3); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.result-score { font:700 20px/1 var(--font); flex-shrink:0; }
.result-score.w { color:var(--brand); }
.result-score.d { color:var(--warn); }
.result-score.l { color:var(--danger); }

/* Alertes — horizontales scrollables */
.alert-scroll {
  display:flex; gap:10px; overflow-x:auto;
  padding:4px 18px 14px; scrollbar-width:none;
}
.alert-scroll::-webkit-scrollbar { display:none; }
.alert-card {
  flex-shrink:0; min-width:200px; max-width:240px;
  background:var(--ink2); border:1px solid var(--sep);
  border-radius:var(--r-lg); padding:14px;
  border-left:3px solid;
}
.alert-card.a-red    { border-left-color:var(--danger); }
.alert-card.a-amber  { border-left-color:var(--warn); }
.alert-card.a-green  { border-left-color:var(--brand); }
.alert-card.a-blue   { border-left-color:var(--info); }
.alert-card-type {
  font:600 10px/1 var(--font); text-transform:uppercase;
  letter-spacing:.8px; margin-bottom:7px;
}
.a-red   .alert-card-type { color:var(--danger); }
.a-amber .alert-card-type { color:var(--warn); }
.a-green .alert-card-type { color:var(--brand); }
.a-blue  .alert-card-type { color:var(--info); }
.alert-card-name { font:600 14px/1.2 var(--font); color:var(--tx1); margin-bottom:4px; }
.alert-card-detail { font:400 12px/1.4 var(--font); color:var(--tx3); }

/* ══════════════════════════════════════
   PRÉSENCES — Interface de pointage claire
   Une session = un geste par joueur
══════════════════════════════════════ */
.session-bar {
  margin:0 18px 16px;
  background:var(--ink2); border:1px solid var(--sep);
  border-radius:var(--r-lg); padding:14px 16px;
  display:flex; align-items:center; gap:12px;
}
.session-bar-icon { font-size:22px; flex-shrink:0; }
.session-bar-info { flex:1; }
.session-bar-title { font:700 15px/1 var(--font); color:var(--tx1); }
.session-bar-sub   { font:400 12px/1 var(--font); color:var(--tx3); margin-top:2px; }
.session-bar-edit  {
  background:none; border:1px solid var(--sep2); color:var(--brand);
  font:600 12px/1 var(--font); padding:7px 12px; border-radius:var(--r-sm);
  cursor:pointer;
}

/* Ligne joueur pour pointer */
.roster-line {
  display:flex; align-items:center; gap:12px;
  padding:12px 18px; border-bottom:1px solid var(--sep);
  transition:background .1s;
}
.roster-line:active { background:var(--ink2); }
.roster-info { flex:1; min-width:0; }
.roster-name { font:600 14px/1 var(--font); color:var(--tx1); }
.roster-pos  { font:500 11px/1 var(--font); margin-top:2px; }
.pos-gk  { color:var(--warn); }
.pos-fix { color:var(--info); }
.pos-ala { color:var(--brand); }
.pos-piv { color:var(--danger); }

/* Boutons statut — grands, nets */
.status-group { display:flex; gap:4px; flex-shrink:0; }
.status-btn {
  width:38px; height:38px; border-radius:10px; border:1.5px solid var(--sep2);
  background:transparent; color:var(--tx3);
  font:700 11px/1 var(--font); cursor:pointer; transition:all .12s;
  display:flex; align-items:center; justify-content:center;
}
.status-btn.s-P { background:rgba(34,197,94,.15); border-color:rgba(34,197,94,.4); color:var(--brand); }
.status-btn.s-R { background:rgba(245,158,11,.15); border-color:rgba(245,158,11,.4); color:var(--warn); }
.status-btn.s-B { background:rgba(245,158,11,.15); border-color:rgba(245,158,11,.4); color:var(--warn); }
.status-btn.s-E { background:rgba(59,130,246,.15); border-color:rgba(59,130,246,.4); color:var(--info); }

/* Stepper RPE */
.rpe-wrap { display:flex; align-items:center; gap:4px; margin-left:2px; }
.rpe-val  {
  min-width:26px; text-align:center; font:700 13px/1 var(--font);
  color:var(--tx2);
}
.rpe-btn  {
  width:26px; height:26px; border-radius:8px;
  background:var(--ink3); border:1px solid var(--sep2); color:var(--tx2);
  font:700 16px/1 var(--font); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .1s;
}
.rpe-btn:active { background:var(--ink4); }

/* Historique/stats présences */
.pres-scroll { overflow-x:auto; padding:0 18px 8px; }
.pres-tbl { border-collapse:collapse; min-width:100%; white-space:nowrap; }
.pres-tbl th {
  font:600 10px/1 var(--font); text-transform:uppercase;
  letter-spacing:.8px; color:var(--tx3); padding:8px 10px;
  background:var(--ink2); border:1px solid var(--sep); text-align:left;
}
.pres-tbl td { padding:9px 10px; border:1px solid var(--sep); font:400 12px/1 var(--font); }
.pres-tbl .pn { font:600 13px/1 var(--font); color:var(--tx1); }
.sp { font-weight:700; }
.sp-P { color:var(--brand); }
.sp-A { color:var(--danger); }
.sp-B { color:var(--warn); }
.sp-E { color:var(--info); }

.stat-line { padding:8px 18px 4px; }
.stat-head { display:flex; justify-content:space-between; margin-bottom:5px; }
.stat-nm   { font:600 13px/1 var(--font); color:var(--tx1); }
.stat-pct  { font:700 13px/1 var(--font); }
.stat-bg   { background:var(--ink3); height:4px; border-radius:2px; overflow:hidden; }
.stat-fill { height:4px; border-radius:2px; background:var(--brand); transition:width .5s; }

/* ══════════════════════════════════════
   MATCHS — Résultats lisibles
══════════════════════════════════════ */
.match-list { padding:0 18px; }
.match-row {
  display:flex; align-items:stretch; margin-bottom:6px;
  background:var(--ink2); border:1px solid var(--sep);
  border-radius:var(--r-lg); overflow:hidden;
  cursor:pointer; transition:border-color .12s;
}
.match-row:active { border-color:var(--sep2); }
.match-stripe { width:4px; flex-shrink:0; }
.match-stripe.w { background:var(--brand); }
.match-stripe.d { background:var(--warn); }
.match-stripe.l { background:var(--danger); }
.match-stripe.n { background:var(--info); }
.match-row-body { flex:1; padding:12px 14px; min-width:0; }
.match-row-meta  { font:500 10px/1 var(--font); color:var(--tx3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
.match-row-teams { font:600 14px/1.3 var(--font); color:var(--tx1); }
.match-row-sc    { font:400 11px/1 var(--font); color:var(--tx3); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.match-row-score {
  flex-shrink:0; padding:0 16px;
  display:flex; align-items:center; justify-content:center;
  border-left:1px solid var(--sep);
  font:700 20px/1 var(--font); letter-spacing:-1px;
}
.match-row-score.w { color:var(--brand); }
.match-row-score.d { color:var(--warn); }
.match-row-score.l { color:var(--danger); }
.match-row-next {
  flex-shrink:0; padding:0 12px;
  display:flex; align-items:center;
  border-left:1px solid var(--sep);
}

/* Score input large */
.score-grid { display:grid; grid-template-columns:1fr 40px 1fr; gap:10px; align-items:end; margin-bottom:14px; }
.score-lbl  { font:600 10px/1 var(--font); color:var(--tx3); text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; text-align:center; }
.score-big  {
  width:100%; background:var(--ink3); border:1.5px solid var(--sep2);
  border-radius:var(--r-md); color:var(--tx1);
  font:700 40px/1 var(--font); text-align:center;
  padding:14px 8px; outline:none; -webkit-appearance:none;
  transition:border-color .15s;
}
.score-big:focus { border-color:var(--brand); }
.score-vs { font:700 18px/1 var(--font); color:var(--tx3); text-align:center; padding-bottom:14px; }

/* ══════════════════════════════════════
   BLESSURES — Medical simple
══════════════════════════════════════ */
.inj-card {
  margin:0 18px 10px;
  background:var(--ink2); border:1px solid var(--sep);
  border-radius:var(--r-lg); overflow:hidden;
  cursor:pointer; transition:border-color .12s;
}
.inj-card:active { border-color:var(--sep2); }
.inj-card-inner { padding:14px 16px; }
.inj-card.healed { opacity:.6; }
.inj-stripe-G1 { border-left:3px solid var(--brand); }
.inj-stripe-G2 { border-left:3px solid var(--warn); }
.inj-stripe-G3, .inj-stripe-G4 { border-left:3px solid var(--danger); }
.inj-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px; }
.inj-player { font:700 15px/1 var(--font); color:var(--tx1); }
.inj-type   { font:400 13px/1.3 var(--font); color:var(--tx2); margin-top:3px; }
.inj-dates  { display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; }
.inj-date-item { font:500 11px/1 var(--font); color:var(--tx3); display:flex; align-items:center; gap:4px; }
.grav-tag {
  font:700 9px/1 var(--font); text-transform:uppercase; letter-spacing:.8px;
  padding:4px 9px; border-radius:4px; border:1px solid; flex-shrink:0;
}
.grav-G1 { border-color:rgba(34,197,94,.4); color:var(--brand); }
.grav-G2 { border-color:rgba(245,158,11,.4); color:var(--warn); }
.grav-G3,.grav-G4 { border-color:rgba(239,68,68,.4); color:var(--danger); }

/* Barre de récupération */
.rec-bar { margin-top:10px; }
.rec-bar-bg { background:var(--ink3); height:5px; border-radius:3px; overflow:hidden; }
.rec-bar-fill { height:5px; border-radius:3px; background:var(--brand); transition:width .6s; }
.rec-labels { display:flex; justify-content:space-between; margin-top:4px; }
.rec-lbl { font:500 9px/1 var(--font); color:var(--tx3); }

.proto-step-card {
  background:var(--ink3); border-radius:var(--r-md);
  padding:10px 12px; margin-bottom:6px;
  border-left:2px solid var(--sep2);
}
.proto-step-ph { font:600 11px/1 var(--font); color:var(--brand); margin-bottom:3px; }
.proto-step-ds { font:400 12px/1.5 var(--font); color:var(--tx2); }
.proto-edit-row { display:flex; gap:6px; margin-bottom:8px; align-items:flex-start; }

/* ══════════════════════════════════════
   PLANNING — Semaine d'entraînement
══════════════════════════════════════ */
.plan-hero {
  margin:12px 18px;
  background:var(--ink2); border:1px solid var(--sep);
  border-radius:var(--r-xl); padding:18px;
  position:relative; overflow:hidden;
}
.plan-hero::after {
  content:''; position:absolute; top:0; left:0; right:0;
  height:2px; background:linear-gradient(90deg, var(--brand), transparent);
}
.plan-match-tag { font:600 10px/1 var(--font); text-transform:uppercase; letter-spacing:1px; color:var(--brand); margin-bottom:8px; }
.plan-match-name { font:700 18px/1.2 var(--font); color:var(--tx1); letter-spacing:-.3px; }
.plan-match-meta { font:500 12px/1 var(--font); color:var(--tx3); margin-top:5px; }
.plan-match-score { font:700 28px/1 var(--font); letter-spacing:-1.5px; margin-top:8px; }

/* Sélecteur de match */
.match-pills {
  display:flex; gap:5px; overflow-x:auto;
  padding:0 18px 14px; scrollbar-width:none;
}
.match-pills::-webkit-scrollbar { display:none; }
.mpill {
  flex-shrink:0; font:600 11px/1 var(--font);
  padding:6px 14px; border-radius:var(--r-full);
  background:var(--ink2); border:1px solid var(--sep2); color:var(--tx3);
  cursor:pointer; transition:all .12s;
}
.mpill.on { background:var(--brand-dim); border-color:rgba(34,197,94,.4); color:var(--brand); }
.mpill.past { opacity:.4; }

/* Bloc journée */
.day-block {
  margin:0 18px 8px;
  background:var(--ink2); border:1px solid var(--sep);
  border-radius:var(--r-lg); overflow:hidden;
}
.day-lundi    { border-left:3px solid #9333ea; }
.day-mardi    { border-left:3px solid var(--danger); }
.day-mercredi { border-left:3px solid var(--info); }

.day-header {
  display:flex; align-items:center; gap:10px;
  padding:12px 14px; cursor:pointer; user-select:none;
}
.day-name {
  font:700 13px/1 var(--font); text-transform:uppercase;
  letter-spacing:1px; min-width:80px;
}
.day-lundi    .day-name { color:#9333ea; }
.day-mardi    .day-name { color:var(--danger); }
.day-mercredi .day-name { color:var(--info); }
.day-type-tag {
  font:600 10px/1 var(--font); text-transform:uppercase; letter-spacing:.8px;
  padding:3px 9px; border-radius:4px; border:1px solid;
}
.day-lundi    .day-type-tag { color:#9333ea; border-color:rgba(147,51,234,.25); background:rgba(147,51,234,.08); }
.day-mardi    .day-type-tag { color:var(--danger); border-color:rgba(239,68,68,.25); background:rgba(239,68,68,.08); }
.day-mercredi .day-type-tag { color:var(--info); border-color:rgba(59,130,246,.25); background:rgba(59,130,246,.08); }

.day-pips { display:flex; gap:3px; }
.pip { width:5px; height:16px; border-radius:3px; background:var(--sep); }
.pip.low  { background:var(--brand); }
.pip.med  { background:var(--warn); }
.pip.high { background:var(--danger); }
.rpe-pill { font:600 11px/1 var(--font); padding:3px 8px; border-radius:4px; margin-left:auto; }

.day-body { border-top:1px solid var(--sep); padding:0 14px 14px; }
.day-goal {
  font:400 13px/1.6 var(--font); color:var(--tx2);
  margin:12px 0; padding-left:10px; border-left:2px solid var(--sep2);
}
.exo-wrap { background:var(--ink3); border-radius:var(--r-md); padding:12px; margin-top:8px; }
.exo-title { font:600 10px/1 var(--font); text-transform:uppercase; letter-spacing:1px; color:var(--tx3); margin-bottom:10px; }
.exo-row { display:flex; gap:12px; padding:8px 0; border-bottom:1px solid var(--sep); }
.exo-row:last-child { border-bottom:none; }
.exo-n { font:700 18px/1 var(--font); color:var(--tx4); min-width:22px; transition:color .12s; }
.exo-row:hover .exo-n { color:var(--brand); }
.exo-name { font:600 13px/1.2 var(--font); color:var(--tx1); margin-bottom:2px; }
.exo-detail { font:400 11px/1.5 var(--font); color:var(--tx3); }

.focus-tag {
  display:inline-block; font:600 9px/1 var(--font);
  text-transform:uppercase; letter-spacing:.8px; padding:3px 7px; border-radius:3px;
  background:var(--brand-dim); color:var(--brand); margin:2px 2px 0 0;
}
.squad-chips { padding:10px; background:var(--ink3); border-radius:var(--r-md); margin-top:8px; }
.squad-chips-title { font:600 9px/1 var(--font); text-transform:uppercase; letter-spacing:1px; color:var(--tx3); margin-bottom:7px; }
.squad-chip {
  display:inline-block; font:500 11px/1 var(--font);
  padding:4px 10px; border-radius:var(--r-full); margin:2px;
  background:var(--ink4); border:1px solid var(--sep); color:var(--tx2);
}
.squad-chip.absent { background:var(--danger-dim); border-color:rgba(239,68,68,.2); color:var(--danger); }

.analysis-card {
  margin:0 18px 10px;
  background:rgba(34,197,94,.04); border:1px solid rgba(34,197,94,.15);
  border-radius:var(--r-lg); padding:14px; border-left:3px solid var(--brand);
}
.analysis-title { font:700 11px/1 var(--font); text-transform:uppercase; letter-spacing:1px; color:var(--brand); margin-bottom:10px; }
.analysis-item { font:400 12px/1.6 var(--font); color:var(--tx2); padding-left:12px; position:relative; }
.analysis-item::before { content:'›'; position:absolute; left:0; color:var(--brand); font-weight:700; }

.matchday-row {
  margin:8px 18px;
  background:var(--brand-dim); border:1px solid rgba(34,197,94,.3);
  border-radius:var(--r-lg); padding:14px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
.matchday-label { font:700 15px/1 var(--font); color:var(--brand); }
.matchday-info  { font:500 12px/1 var(--font); color:var(--tx2); }

/* ══════════════════════════════════════
   SQUAD — Roster lisible
══════════════════════════════════════ */
.player-row {
  display:flex; align-items:center; gap:12px;
  padding:12px 18px; border-bottom:1px solid var(--sep);
  cursor:pointer; transition:background .1s;
}
.player-row:active { background:var(--ink2); }
.player-info { flex:1; min-width:0; }
.player-name { font:600 14px/1 var(--font); color:var(--tx1); }
.player-meta { font:400 11px/1 var(--font); color:var(--tx3); margin-top:3px; }
.player-num { font:700 18px/1 var(--font); color:var(--tx4); flex-shrink:0; }

.goals-row {
  display:flex; align-items:center; gap:12px;
  padding:12px 18px; border-bottom:1px solid var(--sep);
}
.goals-rank { font:700 16px/1 var(--font); color:var(--tx4); min-width:24px; }
.goals-rank.r1 { color:var(--warn); }
.goals-rank.r2 { color:rgba(200,200,200,.7); }
.goals-rank.r3 { color:rgba(180,120,60,.7); }
.goals-info { flex:1; }
.goals-name { font:600 14px/1 var(--font); color:var(--tx1); }
.goals-num  { font:700 24px/1 var(--font); color:var(--brand); }
.goals-lbl  { font:500 9px/1 var(--font); color:var(--tx3); text-transform:uppercase; }

/* ══════════════════════════════════════
   SCOUTING
══════════════════════════════════════ */
.scout-card {
  margin:0 18px 10px;
  background:var(--ink2); border:1px solid var(--sep);
  border-radius:var(--r-lg); overflow:hidden;
}
.scout-header {
  display:flex; align-items:flex-start; justify-content:space-between;
  padding:16px;
}
.scout-name { font:700 18px/1 var(--font); color:var(--tx1); letter-spacing:-.3px; }
.scout-sub  { font:400 11px/1 var(--font); color:var(--tx3); margin-top:3px; }
.scout-rank { font:700 32px/1 var(--font); letter-spacing:-2px; }
.scout-section { padding:10px 16px; border-top:1px solid var(--sep); }
.scout-section-title { font:600 10px/1 var(--font); text-transform:uppercase; letter-spacing:.8px; margin-bottom:5px; }
.scout-section-body  { font:400 12px/1.5 var(--font); color:var(--tx2); }
.scout-key-player {
  padding:10px 16px; border-top:1px solid var(--sep);
  display:flex; align-items:center; gap:8px;
  font:500 12px/1 var(--font); color:var(--tx2);
}

/* ══════════════════════════════════════
   MODAL — Sheet contextuelle
══════════════════════════════════════ */
.overlay {
  display:none; position:fixed; inset:0; z-index:6000;
  background:rgba(0,0,0,.7); backdrop-filter:blur(8px);
  align-items:flex-end; padding:16px;
  overflow-y:auto;
}
.overlay.on { display:flex; }
.sheet {
  background:var(--ink2); border:1px solid var(--sep2);
  border-top:2px solid var(--brand);
  border-radius:var(--r-xl) var(--r-xl) var(--r-lg) var(--r-lg);
  padding:24px; width:100%; max-width:520px;
  margin:0 auto; position:relative;
  box-shadow:0 -12px 60px rgba(0,0,0,.7);
  animation:sheetUp .2s ease;
}
@keyframes sheetUp { from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1} }
.sheet-close {
  position:absolute; top:14px; right:14px;
  width:30px; height:30px; border-radius:var(--r-sm);
  background:var(--ink3); border:1px solid var(--sep2); color:var(--tx3);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:13px; transition:all .12s;
}
.sheet-close:hover { border-color:var(--danger); color:var(--danger); }
.sheet-title { font:700 17px/1 var(--font); color:var(--tx1); margin-bottom:20px; letter-spacing:-.3px; }
.sheet-field { margin-bottom:12px; }
.sheet-field strong { font:600 10px/1 var(--font); text-transform:uppercase; letter-spacing:.8px; color:var(--tx3); display:block; margin-bottom:4px; }
.sheet-field p { font:400 14px/1.5 var(--font); color:var(--tx2); }
.sheet-section-title { font:600 11px/1 var(--font); text-transform:uppercase; letter-spacing:.8px; color:var(--tx3); padding-top:14px; padding-bottom:10px; border-bottom:1px solid var(--sep); margin-bottom:12px; }

/* ══════════════════════════════════════
   PROFIL
══════════════════════════════════════ */
.profile-hero {
  padding:24px 18px; display:flex; align-items:center; gap:16px;
}
.profile-av-lg {
  width:60px; height:60px; border-radius:18px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font:700 20px/1 var(--font); text-transform:uppercase;
}
.profile-name { font:800 22px/1 var(--font); color:var(--tx1); letter-spacing:-.5px; }
.profile-pos  { font:500 13px/1 var(--font); margin-top:4px; }
.profile-num  { font:400 12px/1 var(--font); color:var(--tx3); margin-top:3px; }

/* ══════════════════════════════════════
   EMPTY STATES
══════════════════════════════════════ */
.empty {
  text-align:center; padding:44px 24px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.empty-icon { font-size:40px; opacity:.35; }
.empty-title { font:700 16px/1 var(--font); color:var(--tx2); }
.empty-sub   { font:400 13px/1.5 var(--font); color:var(--tx3); }


/* ══════════════════════════════════════
   STATS — Analytics + graphiques natifs
══════════════════════════════════════ */
.stats-hero {
  background:var(--ink2); border:1px solid var(--sep);
  border-radius:var(--r-xl); margin:12px 18px;
  overflow:hidden; position:relative;
}
.stats-hero::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:2px; background:linear-gradient(90deg,var(--brand),transparent);
}
.stats-kpi-row {
  display:flex; gap:1px; background:var(--sep);
  border-bottom:1px solid var(--sep);
}
.stats-kpi {
  flex:1; background:var(--ink2); padding:14px 12px; text-align:center;
}
.stats-kpi-num {

/* ════════ ACCUEIL ════════ */
function renderHome() {
  /* KPIs */
  const dispo=S.players.filter(p=>p.status==='Disponible').length;
  const blesse=S.injuries.length;
  const played=S.matches.filter(m=>m.result);
  const W=played.filter(m=>m.result==='V').length, D=played.filter(m=>m.result==='N').length, L=played.filter(m=>m.result==='D').length;
  const pts=W*3+D;
  const pPres=S.presences.filter(r=>r.status==='P').length, pTot=S.presences.length;
  const pPct=pTot?Math.round(pPres/pTot*100):0;
  $('home-kpis').innerHTML=`<div class="quick-stats">
    <div class="qs-cell"><div class="qs-num" style="color:var(--brand);">${dispo}</div><div class="qs-lbl" data-t="available">Dispos</div></div>
    <div class="qs-cell"><div class="qs-num" style="color:var(--danger);">${blesse}</div><div class="qs-lbl" data-t="injured_count">Blessés</div></div>
    <div class="qs-cell"><div class="qs-num">${pPct}%</div><div class="qs-lbl">Présence</div></div>
    <div class="qs-cell"><div class="qs-num">${pts}</div><div class="qs-lbl">${W}V ${D}N ${L}D</div></div>
  </div>`;

  /* Prochain match */
  const nxt=S.matches.find(m=>!m.result);
  if (nxt) {
    const sc=S.scouting.find(s=>s.opponent_name?.toLowerCase().includes((nxt.opponent||'').split(' ')[0].toLowerCase()));
    let cnt='';
    if (nxt.match_date) { const d=Math.round((new Date(nxt.match_date)-new Date())/86400000); cnt=d===0?msg('today'):d===1?msg('tomorrow'):d>0?`Dans ${d} jours`:''; }
    const absents=S.injuries.map(i=>`<span class="absent-pill">${(i.players?.name||'').split(' ')[1]||''} 🩺</span>`).join('');
    $('home-match').innerHTML=`<div class="match-hero">
      <div class="match-tag"><div class="match-tag-dot"></div>Prochain match · ${nxt.journee||''} · ${fd(nxt.match_date)}</div>
      <div class="match-teams">
        <div class="match-team-name ${nxt.is_home?'home':''}">${nxt.is_home?'Vilvoorde':nxt.opponent}</div>
        <div class="match-sep">vs</div>
        <div class="match-team-name ${!nxt.is_home?'home':''}">${nxt.is_home?nxt.opponent:'Vilvoorde'}</div>
      </div>
      <div class="match-infos">
        <span class="match-info-item">${nxt.is_home?msg('home_venue'):msg('away_venue')}</span>
        ${sc?`<span class="match-info-item">· ${sc.system||''}</span>`:''}
        ${sc?.key_player?`<span class="match-info-item">· 🎯 ${sc.key_player}</span>`:''}
      </div>
      ${cnt?`<div class="match-countdown">${cnt}</div>`:''}
      ${absents?`<div class="match-absents"><div class="match-absents-title" data-t="absent">Absents</div>${absents}</div>`:''}
    </div>`;
  } else {
    $('home-match').innerHTML=`<div class="match-hero"><div class="match-tag">Aucun match programmé</div></div>`;
  }

  /* Alertes — dédupliquées */
  const seen=new Set(), cards=[];
  S.injuries.forEach(inj=>{
    const k='i'+inj.id; if(seen.has(k))return; seen.add(k);
    const sev=['G3','G4'].includes(inj.severity);
    cards.push(`<div class="alert-card ${sev?'a-red':'a-amber'}">
      <div class="alert-card-type">🩺 ${sev?'Blessure grave':'Blessure'}</div>
      <div class="alert-card-name">${inj.players?.name||'—'}</div>
      <div class="alert-card-detail">${inj.type}<br>Retour ${fd(inj.return_date)||'?'}</div>
    </div>`);
  });
  S.players.filter(p=>p.yellow_cards>=2).forEach(p=>{
    const k='c'+p.id; if(seen.has(k))return; seen.add(k);
    const susp=p.yellow_cards>=3;
    cards.push(`<div class="alert-card ${susp?'a-red':'a-amber'}">
      <div class="alert-card-type">🟨 ${susp?'Suspendu':'Risque suspension'}</div>
      <div class="alert-card-name">${p.name}</div>
      <div class="alert-card-detail">${p.yellow_cards} carton(s)</div>
    </div>`);
  });
  $('home-alerts').innerHTML=cards.length
    ?`<div class="alert-scroll">${cards.join('')}</div>`
    :`<div class="empty" style="padding:20px 18px;"><div class="empty-icon">✅</div><div class="empty-sub">Aucune alerte — tout va bien !</div></div>`;

  /* Résultats */
  const recent=[...S.matches].filter(m=>m.result).reverse().slice(0,5);
  $('home-results').innerHTML=recent.map(m=>{
    const c=m.result==='V'?'w':m.result==='N'?'d':'l';
    return `<div class="result-item">
      <div class="result-bar ${c}"></div>
      <div class="result-info">
        <div class="result-teams">${m.is_home?`<strong>VFC</strong> vs ${m.opponent}`:`${m.opponent} vs <strong>VFC</strong>`}</div>
        <div class="result-meta">${m.journee||''} · ${fd(m.match_date)} · ${m.is_home?'Dom':'Ext'}</div>
        ${m.scorers?`<div class="result-scorers">⚽ ${m.scorers}</div>`:''}
      </div>
      <div class="result-score ${c}">${m.score_home}–${m.score_away}</div>
    </div>`;
  }).join('')||`<div class="empty" style="padding:20px 18px;"><div class="empty-icon">⚽</div><div class="empty-sub">Aucun résultat</div></div>`;
}

/* ════════ PRÉSENCES ════════ */
function renderPresences() {
  /* Pointer */
  const listEl=$('roster-list');
  if (listEl&&S.players.length) {
    // Init statuts
    if (!Object.keys(S.presStatus).length) {
      S.players.forEach(p=>{S.presStatus[p.id]= S.injuries.some(i=>i.player_id===p.id&&i.status!=='healed')?'B':'P';});
      S.injuries.forEach(i=>{S.presStatus[i.player_id]='B';});
    }
    listEl.innerHTML=S.players.map(p=>{
      const cur=S.presStatus[p.id]||'P';
      const rpe=S.presRpe[p.id]||0;
      const statusLabels={'P':'Présent','B':'Blessé','R':'En retard'};
      const statusIcons={'P':'✅','B':'🤕','R':'⏰'};
      const btns=['P','B','R'].map(s=>
        `<button class="status-btn ${cur===s?'s-'+s:''}" onclick="setStatus('${p.id}','${s}')">${statusIcons[s]} ${statusLabels[s]}</button>`
      ).join('');
      return `<div class="roster-line">
        ${(()=>{const lp=LOOKER_DATA.players.find(x=>x.name===p.name||p.name?.includes(x.short?.split(' ').slice(-1)[0]));
          return lp?.photo?'<img style="width:36px;height:36px;border-radius:50%;object-fit:cover;object-position:center top;border:1.5px solid var(--sep2);flex-shrink:0" src="'+lp.photo+'">':'<div class="av '+avClass(p.position)+' av-sm">'+initials(p.name)+'</div>';})()}
        <div class="roster-info">
          <div class="roster-name">${p.name}</div>
          <div class="roster-pos pos-${posClass(p.position)}">${p.position}</div>
        </div>
        <div class="status-group">${btns}</div>
        <div class="rpe-wrap">
          <button class="rpe-btn" onclick="adjRpe('${p.id}',-1)">−</button>
          <div class="rpe-val" id="rpe-${p.id}">${rpe||'—'}</div>
          <button class="rpe-btn" onclick="adjRpe('${p.id}',1)">+</button>
        </div>
      </div>`;
    }).join('');
  }
  // Initialiser date
  const dd=$('pres-date'); if(dd&&!dd.value) dd.value=new Date().toISOString().split('T')[0];

  /* Historique */
  const histEl=$('pres-hist-content');
  if (histEl) {
    const dates=[...new Set(S.presences.map(p=>p.session_date))].slice(0,10);
    if (dates.length) {
      histEl.innerHTML=`<div class="pres-scroll"><table class="pres-tbl">
        <thead><tr><th>Joueur</th>${dates.map(d=>`<th>${fd(d)}</th>`).join('')}</tr></thead>
        <tbody>${S.players.map(pl=>{
          const cells=dates.map(d=>{const p=S.presences.find(pp=>pp.player_id===pl.id&&pp.session_date===d);return`<td class="sp sp-${p?.status||''}">${p?.status||'—'}</td>`;}).join('');
          return`<tr><td class="pn">${pl.name.split(' ')[1]||pl.name}</td>${cells}</tr>`;
        }).join('')}</tbody>
      </table></div>`;
    } else {
      histEl.innerHTML=emptyState('📅','Aucun historique');
    }
  }

  /* Stats */
  const stEl=$('pres-stats-content');
  if (stEl) {
    const rows=S.players.map(pl=>{
      const r=S.presences.filter(p=>p.player_id===pl.id);
      const tot=r.length, ok=r.filter(p=>p.status==='P').length;
      const pct=tot?Math.round(ok/tot*100):0;
      const c=pct>=80?'var(--brand)':pct>=60?'var(--warn)':'var(--danger)';
      return{pl,pct,tot,c};
    }).sort((a,b)=>b.pct-a.pct);
    stEl.innerHTML=rows.map(({pl,pct,c,tot})=>`<div class="stat-line">
      <div class="stat-head">
        <span class="stat-nm">${pl.name}</span>
        <span class="stat-pct" style="color:${c};">${pct}% <span style="color:var(--tx3);font-weight:400;">(${tot})</span></span>
      </div>
      <div class="stat-bg"><div class="stat-fill" style="width:${pct}%;background:${c};"></div></div>
    </div>`).join('');
  }
}

window.setStatus=(pid,s)=>{
  S.presStatus[pid]=s;
  document.querySelectorAll(`.status-btn`).forEach(btn=>{
    if(btn.closest('.roster-line')?.querySelector('.av')?.textContent===initials(S.players.find(p=>p.id===pid)?.name||'')) return;
  });
  // Re-render just that row
  const line=document.querySelector(`[onclick="setStatus('${pid}','P')"]`)?.closest('.roster-line');
  if(line){
    line.querySelectorAll('.status-btn').forEach(btn=>{
      btn.classList.toggle('s-P',btn.textContent==='P'&&s==='P');
      btn.classList.toggle('s-A',btn.textContent==='A'&&s==='A');
      btn.classList.toggle('s-B',btn.textContent==='B'&&s==='B');
      btn.classList.toggle('s-E',btn.textContent==='E'&&s==='E');
      if(btn.textContent!==s) { btn.classList.remove('s-P','s-A','s-B','s-E'); }
    });
  }
};
window.adjRpe=(pid,d)=>{
  const cur=S.presRpe[pid]||0;
  const nxt=Math.max(1,Math.min(10,cur+d));
  S.presRpe[pid]=nxt;
  const el=$('rpe-'+pid); if(el) el.textContent=nxt;
};

window.savePresences=async()=>{
  const date=$('pres-date').value, type=$('pres-type').value;
  if(!date){toast('⚠ Date requise');return;}
  const rows=S.players.map(p=>({
    player_id:p.id, session_date:date, session_type:type,
    status:S.presStatus[p.id]||'P', rpe:S.presRpe[p.id]||null,
  }));
  try{
    const{error}=await sb.from('presences').upsert(rows,{onConflict:'player_id,session_date,session_type'});
    if(error)throw error;
    S.presStatus={}; S.presRpe={};
    const{data}=await sb.from('presences').select('*,players(name,position)').order('session_date',{ascending:false}).limit(300);
    S.presences=data||[];
    renderPresences(); renderHome();
    toast(msg('saved'));
  }catch(e){toast('✗ '+e.message);}
};

function matchRow(m){
  if(!m.result)return`<div class="match-row">
    <div class="match-stripe n"></div>
    <div class="match-row-body">
      <div class="match-row-meta">${m.journee||''} · ${fd(m.match_date)} · ${m.is_home?'Dom':'Ext'}</div>
      <div class="match-row-teams">${m.is_home?`<strong>VFC</strong> vs ${m.opponent}`:`${m.opponent} vs <strong>VFC</strong>`}</div>
    </div>
    <div class="match-row-next"><span class="chip chip-blue">À venir</span></div>
  </div>`;
  const c=m.result==='V'?'w':m.result==='N'?'d':'l';
  return`<div class="match-row">
    <div class="match-stripe ${c}"></div>
    <div class="match-row-body">

window.saveMatchForm=async()=>{

  const sn=parseInt($('m-sn').value), se=parseInt($('m-se').value);

  try{
    const{error}=await sb.from('matches').insert({
      journee:$('m-journee').value, match_date:$('m-date').value||null,
      is_home:$('m-home').value==='true', opponent:opp,
      score_home:played?sn:null, score_away:played?se:null,
      result:played?(sn>se?'V':sn<se?'D':'N'):null,
      scorers:$('m-scorers').value, cards:$('m-cards').value, notes:$('m-notes').value,
    });

    ['m-journee','m-opp','m-sn','m-se','m-scorers','m-cards','m-notes'].forEach(id=>{const e=$(id);if(e)e.value='';});

    treatment:$('inj-treat').value,protocol:_ps.filter(s=>s.phase||s.desc),
    matches_missed:$('inj-matches').value,notes:$('inj-notes').value,is_active:true};

async function renderPlanning(){
  const el=$('planning-content');if(!el)return;
  if(S.planIdx===null){const i=S.matches.findIndex(m=>!m.result);S.planIdx=i>=0?i:S.matches.length-1;}
  const match=S.matches[S.planIdx];
  if(!match){el.innerHTML=emptyState('📅','Aucun match disponible');return;}

  const sc=S.scouting.find(s=>s.opponent_name?.toLowerCase().includes((match.opponent||'').split(' ')[0].toLowerCase()));
  let plan=S.plans[match.id];
  if(!plan){
    const{data}=await sb.from('training_plans').select('*').eq('match_id',match.id).maybeSingle();
    if(data){plan=data;S.plans[match.id]=data;}
    else{const mc=generateMicrocycle(sc);plan={sessions:mc.sessions,week_note:'',analysis:mc.analysis};S.plans[match.id]=plan;}
  }
  const absent=S.injuries.map(i=>i.players?.name||'');
  let dLabel='';
  if(match.match_date){const d=Math.round((new Date(match.match_date)-new Date())/86400000);dLabel=d===0?msg('today'):d===1?msg('tomorrow'):d>0?`J–${d}`:'Passé';}

  const pills=S.matches.map((m,i)=>
    `<button class="mpill ${i===S.planIdx?'on':''} ${m.result?'past':''}" onclick="setPlanIdx(${i})">${m.journee||'?'}</button>`
  ).join('');

  const analysis=plan.analysis||{consignes:[]};

  el.innerHTML=`
    <div class="plan-hero">
      <div class="plan-match-tag">${match.result?'Match passé':'Prochain match'} · ${match.journee||''}</div>
      <div class="plan-match-name">${match.is_home?`Vilvoorde vs ${match.opponent}`:match.opponent+' vs Vilvoorde'}</div>
      <div class="plan-match-meta">${fd(match.match_date)} · ${match.is_home?'Domicile':'Extérieur'}${sc?' · '+sc.system:''}</div>
      ${match.result?`<div class="plan-match-score" style="color:${match.result==='V'?'var(--brand)':match.result==='N'?'var(--warn)':'var(--danger)'};">${match.score_home}–${match.score_away}</div>`:''}
      ${dLabel?`<div style="font:700 18px/1 var(--font);color:var(--brand);margin-top:8px;">${dLabel}</div>`:''}
      ${absent.length?`<div class="match-absents"><div class="match-absents-title" data-t="absent">Absents</div>${absent.map(n=>`<span class="absent-pill">${n.split(' ')[1]||n} 🩺</span>`).join('')}</div>`:''}
    </div>
    <div class="match-pills">${pills}</div>
    ${analysis.consignes?.length?`<div class="analysis-card">
      <div class="analysis-title">🧠 Adaptations face à ${match.opponent||'cet adversaire'}</div>
      ${analysis.consignes.map(c=>`<div class="analysis-item">${c}</div>`).join('')}
    </div>`:''}
    <div style="padding:0 18px 10px;font:700 12px/1 var(--font);text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);">Programme de la semaine</div>
    ${(plan.sessions||[]).map((s,si)=>dayBlock(s,si,match.id,absent)).join('')}

      <div class="matchday-label">⚽ Jour du match</div>
      <div class="matchday-info">${match.opponent||''} · ${fd(match.match_date)}</div>
    </div>
    ${['coach','admin'].includes(S.role)?`<div style="padding:14px 18px 0;">
      <label class="fl">Note de semaine</label>
      <textarea class="fi" style="min-height:60px;" placeholder="Tactique, gestion du groupe..."
        oninput="S.plans['${match.id}'].week_note=this.value">${plan.week_note||''}</textarea>
      <button class="btn btn-green btn-block" style="margin-top:10px;" onclick="savePlan('${match.id}')">Sauvegarder le planning</button>
    </div><div style="height:16px;"></div>`:'<div style="height:16px;"></div>'}
  `;
  window.S=S;
}

function dayBlock(s,si,mid,absent){
  const COL={lundi:'#9333ea',mardi:'var(--danger)',mercredi:'var(--info)'};
  const c=COL[s.type]||'var(--tx3)';
  const int={lundi:4,mardi:6,mercredi:5}[s.type]||4;
  const exp=S.expanded.has(mid+'_'+si);
  const pips=[1,2,3,4,5,6].map(d=>{const on=d<=int;const cl=on?(int<=3?'low':int<=5?'med':'high'):'';return`<div class="pip ${on?cl:''}"></div>`;}).join('');
  return`<div class="day-block day-${s.type}">
    <div class="day-header" onclick="toggleDay('${mid}',${si})">
      <div class="day-name">${s.dayName||s.label}</div>
      <div class="day-type-tag">${s.type||''}</div>
      <div class="day-pips">${pips}</div>
      <div class="rpe-pill" style="background:${c}22;color:${c};margin-left:auto;">RPE ${s.rpe_target||'—'}</div>
      ${['coach','admin'].includes(S.role)?`<button class="btn btn-sm btn-outline" style="margin-left:6px;" onclick="event.stopPropagation();editDay('${mid}',${si})">Éditer</button>`:''}
      <span style="color:var(--tx3);margin-left:6px;">${exp?'▲':'▼'}</span>
    </div>
    ${exp?`<div class="day-body">
      ${s.objectif?`<div class="day-goal">${s.objectif}</div>`:''}
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
        <span style="font:500 11px/1 var(--font);color:var(--tx3);">⏱ ${s.duration||75} min</span>
        ${(s.focus||[]).map(f=>`<span class="focus-tag">${f}</span>`).join('')}
      </div>
      <div class="exo-wrap">
        <div class="exo-title">Exercices</div>
        ${(s.exercises||[]).map((ex,ei)=>`<div class="exo-row">
          <div class="exo-n">${ei+1}</div>
          <div><div class="exo-name">${ex.name}</div><div class="exo-detail">${ex.detail}</div>
          <div style="margin-top:4px;">${(ex.focus||[]).map(f=>`<span class="focus-tag">${f}</span>`).join('')}</div></div>
        </div>`).join('')}
      </div>
      <div class="squad-chips" style="margin-top:8px;">
        <div class="squad-chips-title">Groupe disponible</div>
        ${S.players.filter(p=>p.status==='Disponible').map(p=>`<span class="squad-chip">${p.name.split(' ')[1]||p.name} <span style="font-size:9px;color:${posColor(p.position)};">${p.position}</span></span>`).join('')}
        ${absent.map(n=>`<span class="squad-chip absent">${n.split(' ')[1]||n} 🩺</span>`).join('')}
      </div>
    </div>`:''}
  </div>`;
}

window.toggleDay=(mid,si)=>{const k=mid+'_'+si;S.expanded.has(k)?S.expanded.delete(k):S.expanded.add(k);renderPlanning();};
window.setPlanIdx=idx=>{S.planIdx=idx;renderPlanning();};
window.savePlan=async mid=>{
  const plan=S.plans[mid];if(!plan)return;
  try{
    const p={match_id:mid,sessions:plan.sessions,week_note:plan.week_note||''};
    const{data,error}=plan.id?await sb.from('training_plans').update(p).eq('id',plan.id).select().single():await sb.from('training_plans').insert(p).select().single();
    if(error)throw error;S.plans[mid]={...plan,...data};toast('Planning sauvegardé ✓');
  }catch(e){toast('✗ '+e.message);}
};

    <div class="fg"><label class="fl">Label</label><input class="fi" id="ed-l" value="${s.label||''}"></div>
    <div class="fg2">
      <div class="fg"><label class="fl">Type</label><select class="fs" id="ed-t">${opts}</select></div>
      <div class="fg"><label class="fl">Durée (min)</label><input type="number" class="fi" id="ed-d" value="${s.duration||75}"></div>
    </div>
    <div class="fg2">
      <div class="fg"><label class="fl">RPE cible</label><input class="fi" id="ed-r" value="${s.rpe_target||''}"></div>
      <div class="fg"><label class="fl">Focus</label><input class="fi" id="ed-f" value="${(s.focus||[]).join(', ')}"></div>
    </div>
    <div class="fg"><label class="fl">Notes</label><textarea class="fi" id="ed-n">${s.notes||''}</textarea></div>
    <p style="font:700 10px/1 var(--font);text-transform:uppercase;letter-spacing:.8px;color:var(--brand);margin-bottom:10px;">Exercices</p>
    ${[0,1,2].map(i=>`<div class="fg"><label class="fl">Ex. ${i+1}</label>
      <input class="fi" id="ed-en${i}" value="${s.exercises?.[i]?.name||''}" placeholder="Nom" style="margin-bottom:6px;">
      <input class="fi" id="ed-ed${i}" value="${s.exercises?.[i]?.detail||''}" placeholder="Détails"></div>`).join('')}
    <div class="btn-row" style="margin-top:14px;">
      <button class="btn btn-outline" style="flex:1;" onclick="close_modal('modal-session')">Annuler</button>
      <button class="btn btn-green" style="flex:2;" onclick="saveDay('${mid}',${si})">Enregistrer</button>
    </div>
    <button class="btn btn-danger btn-block" style="margin-top:8px;" onclick="deleteDay('${mid}',${si});close_modal('modal-session')">Supprimer la séance</button>
  `;
  open_modal('modal-session');
};
window.saveDay=(mid,si)=>{
  const p=S.plans[mid];if(!p)return;
  p.sessions[si]={...p.sessions[si],label:$('ed-l').value,type:$('ed-t').value,duration:parseInt($('ed-d').value)||75,rpe_target:$('ed-r').value,focus:$('ed-f').value.split(',').map(f=>f.trim()).filter(Boolean),notes:$('ed-n').value,exercises:[0,1,2].map(i=>({name:$('ed-en'+i).value,detail:$('ed-ed'+i).value})).filter(e=>e.name)};
  close_modal('modal-session');renderPlanning();toast(msg('updated'));
};
window.deleteDay=(mid,si)=>{S.plans[mid]?.sessions.splice(si,1);renderPlanning();toast(msg('deleted'));};

/* ════════ SQUAD ════════ */
function renderSquad(){
  const sb2=s=>({Disponible:'chip-green',Blessé:'chip-red',Suspendu:'chip-amber',Incertain:'chip-amber'})[s]||'chip-muted';
  $('roster-eff').innerHTML=S.players.map(p=>`<div class="player-row">
    <div class="av ${avClass(p.position)}">${initials(p.name)}</div>
    <div class="player-info">
      <div class="player-name">${p.name}</div>
      <div class="player-meta"><span class="roster-pos pos-${posClass(p.position)}">${p.position}</span> · ${p.nationality||'—'} · ⚽ ${p.goals||0} · 🅰 ${p.assists||0}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">
      <span class="chip ${sb2(p.status)}">${p.status}</span>
      ${p.yellow_cards?`<span style="font:600 10px/1 var(--font);color:var(--warn);">🟨 ${p.yellow_cards}</span>`:''}
    </div>
    <div class="player-num">${p.number||'—'}</div>
  </div>`).join('');

  $('disc-list').innerHTML=[...S.players].filter(p=>p.yellow_cards>0||p.red_cards>0).sort((a,b)=>b.yellow_cards-a.yellow_cards).map(p=>`<div class="player-row">
    <div class="av ${avClass(p.position)}">${initials(p.name)}</div>
    <div class="player-info"><div class="player-name">${p.name}</div><div class="player-meta pos-${posClass(p.position)}">${p.position}</div></div>
    <div style="display:flex;gap:5px;align-items:center;">
      ${p.yellow_cards?`<span class="chip chip-amber">🟨 ${p.yellow_cards}</span>`:''}
      ${p.red_cards?`<span class="chip chip-red">🟥 ${p.red_cards}</span>`:''}
      ${p.yellow_cards>=3?'<span class="chip chip-red">Suspendu</span>':p.yellow_cards>=2?'<span class="chip chip-amber">Risque</span>':''}
    </div>
  </div>`).join('')||emptyState('🏅','Aucun carton cette saison');

  const maxG=Math.max(...S.players.map(p=>p.goals||0),1);
  $('goals-list').innerHTML=[...S.players].sort((a,b)=>(b.goals||0)-(a.goals||0)).map((p,i)=>`<div class="goals-row">
    <div class="goals-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div>
    <div class="av ${avClass(p.position)} av-sm">${initials(p.name)}</div>
    <div class="goals-info">
      <div class="goals-name">${p.name}</div>
      <div class="roster-pos pos-${posClass(p.position)}" style="font-size:10px;">${p.position}</div>
      <div style="background:var(--ink3);height:3px;border-radius:2px;margin-top:5px;overflow:hidden;">
        <div style="height:3px;background:var(--brand);border-radius:2px;width:${Math.round((p.goals||0)/maxG*100)}%;"></div>
      </div>
    </div>
    <div style="text-align:right;">
      <div class="goals-num">${p.goals||0}</div>
      <div class="goals-lbl">buts</div>
    </div>
  </div>`).join('');
}

/* ════════ PROFIL ════════ */
function renderProfile(){
  if(!S.profile)return;
  const el=$('profile-content');
  const player=S.players.find(p=>p.id===S.profile.player_id);
  if(!player){
    el.innerHTML=`<div class="sec"><div class="sec-title">Mon profil</div></div>`+emptyState('👤','Profil non lié au joueur. Contactez le coach.');
    return;
  }
  const myP=S.presences.filter(p=>p.player_id===player.id);
  const myI=[...S.injuries,...S.injHistory].filter(i=>i.player_id===player.id);
  const pct=myP.length?Math.round(myP.filter(p=>p.status==='P').length/myP.length*100):0;
  el.innerHTML=`
    <div class="profile-hero">
      ${(() => {
                const lp = LOOKER_DATA.players.find(lp2 => lp2.name.toLowerCase().includes(player.name?.split(' ').slice(-1)[0]?.toLowerCase() || ''));
                return lp?.photo ? 
                  `<img class="squad-avatar" src="${lp.photo}" 
                   
                    alt="${player.name}">` :
                  `<div class="profile-av-lg ${avClass(player.position)}">${initials(player.name)}</div>`;
              })()}
      <div>
        <div class="profile-name">${player.name}</div>
        <div class="profile-pos pos-${posClass(player.position)}">${player.position}</div>
        <div class="profile-num">N° ${player.number||'—'} · ${player.nationality||'—'}</div>
      </div>
    </div>
    <div class="quick-stats" style="margin:0 18px 16px;">
      <div class="qs-cell"><div class="qs-num" style="color:var(--brand);">${player.goals||0}</div><div class="qs-lbl">Buts</div></div>
      <div class="qs-cell"><div class="qs-num">${player.assists||0}</div><div class="qs-lbl">Assists</div></div>
      <div class="qs-cell"><div class="qs-num">${pct}%</div><div class="qs-lbl">Présence</div></div>
      <div class="qs-cell"><div class="qs-num" style="color:var(--danger);">${player.yellow_cards||0}</div><div class="qs-lbl">Cartons</div></div>
    </div>
    <div class="sec"><div class="sec-title">Présences récentes</div></div>
    ${myP.slice(0,10).map(p=>`<div class="result-item" style="padding:10px 18px;">
      <div class="result-bar ${p.status==='P'?'w':p.status==='A'?'l':p.status==='B'?'d':'n'}"></div>
      <div class="result-info"><div class="result-meta">${fd(p.session_date)} · ${p.session_type}</div></div>
      <span class="chip ${p.status==='P'?'chip-green':p.status==='A'?'chip-red':p.status==='B'?'chip-amber':'chip-blue'}">${p.status}${p.rpe?' · RPE '+p.rpe:''}</span>
    </div>`).join('')||emptyState('📅','Aucune présence')}
    ${myI.length?`<div class="sec"><div class="sec-title">Blessures</div></div>${myI.map(i=>`<div class="inj-card inj-stripe-${i.severity}" style="margin:0 18px 8px;" onclick="openInjDetail('${i.id}',${!i.is_active})">
      <div class="inj-card-inner"><div class="inj-player">${i.type}</div><div class="inj-dates"><span>${fd(i.injury_date)}</span><span>${i.severity}</span><span>${i.is_active?'En cours':'Guéri '+fd(i.healed_at)}</span></div></div>
    </div>`).join('')}`:''}
    <div style="height:16px;"></div>
  `;
}

/* ── Utils ── */
function emptyState(icon,text){return`<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-sub">${text}</div></div>`;}
function populateSel(){
  const ps=$('inj-player');
  if(ps) ps.innerHTML=S.players.map(p=>`<option value="${p.name}" data-id="${p.id}">${p.name} (${p.position})</option>`).join('');
  const dd=$('pres-date');if(dd&&!dd.value)dd.value=new Date().toISOString().split('T')[0];
  const id=$('inj-date');if(id&&!id.value)id.value=new Date().toISOString().split('T')[0];
}

/* ─── Radar SVG ─── */
function radarSVG(player) {
  const metrics = [
    { label:'Buts/M',  val: Math.min(player.goals_per_match/1.5*100, 100) },
    { label:'Assists', val: Math.min(player.assists_per_match/0.8*100, 100) },
    { label:'Précision',val: Math.min(player.precision/60*100, 100) },
    { label:'Efficacité',val: Math.min(player.efficiency/25*100, 100) },
    { label:'xG+/-',  val: Math.min(Math.max((player.xG_diff+2)/10*100,0), 100) },
    { label:'Discipline',val: player.discipline },
  ];
  const cx=110, cy=100, r=70, n=metrics.length;
  const angle = i => (i/n)*2*Math.PI - Math.PI/2;
  const pt = (i, pct) => {
    const a=angle(i), d=r*pct/100;
    return [cx+d*Math.cos(a), cy+d*Math.sin(a)];
  };
  // Grilles
  let grid='', labels='', poly='';
  [25,50,75,100].forEach(pct => {
    const pts=[];
    for(let i=0;i<n;i++) { const [x,y]=pt(i,pct); pts.push(x+','+y); }
    const col = pct===100?'rgba(34,197,94,.3)':'rgba(255,255,255,.07)';
    grid += '<polygon points="'+pts.join(' ')+'" fill="none" stroke="'+col+'" stroke-width="'+(pct===100?1.5:.7)+'"/>';
  });
  // Axes et labels
  for(let i=0;i<n;i++) {
    const [x1,y1]=pt(i,100);
    grid += '<line x1="'+cx+'" y1="'+cy+'" x2="'+x1+'" y2="'+y1+'" stroke="rgba(255,255,255,.1)" stroke-width=".7"/>';
    const [lx,ly]=pt(i,115);
    const anchor = lx<cx-5?'end':lx>cx+5?'start':'middle';
    labels += '<text x="'+lx+'" y="'+(ly+3)+'" text-anchor="'+anchor+'" font-size="9" fill="rgba(255,255,255,.5)" font-family="Inter,sans-serif">'+metrics[i].label+'</text>';
  }
  // Polygone joueur
  const polyPts=[];
  for(let i=0;i<n;i++) { const [x,y]=pt(i,metrics[i].val); polyPts.push(x+','+y); }
  poly = '<polygon points="'+polyPts.join(' ')+'" fill="rgba(34,197,94,.2)" stroke="rgba(34,197,94,.9)" stroke-width="1.5"/>';
  for(let i=0;i<n;i++) {
    const [x,y]=pt(i,metrics[i].val);
    poly += '<circle cx="'+x+'" cy="'+y+'" r="3" fill="var(--brand)"/>';
  }
  return '<svg class="radar-svg" width="220" height="200" viewBox="0 0 220 200">'+grid+poly+labels+'</svg>';
}

/* ─── Discipline ─── */
function renderCoachDiscipline() {
  const players = LOOKER_DATA.players;
  const atRisk = players.filter(p => p.yellow >= 3);
  const clean  = players.filter(p => p.yellow === 0);

  // Calculer stats présences depuis S.presences
  const presStats = {};
  players.forEach(p => {
    const name = p.short;
    const sp = S.players.find(sp2 => sp2.name?.includes(p.short.split(' ').slice(-1)[0]));
    presStats[name] = { present: 0, blesse: 0, retard: 0, total: 0 };
  });
  S.presences.forEach(pr => {
    const sp = S.players.find(p => p.id === pr.player_id);
    if (!sp) return;
    const lp = players.find(p => p.name.toLowerCase().includes(sp.name?.split(' ').slice(-1)[0]?.toLowerCase() || ''));
    if (!lp) return;
    const key = lp.short;
    if (!presStats[key]) presStats[key] = { present:0, blesse:0, retard:0, total:0 };
    presStats[key].total++;
    if (pr.status === 'P') presStats[key].present++;
    else if (pr.status === 'B') presStats[key].blesse++;

/* ═══ HELPERS TEMPORELS ═══ */
function getPlayerKey(playerName) {
  return PLAYER_KEY[playerName] || playerName.split(' ').slice(-1)[0];
}

function getPlayerTimeSeries(key, metric) {
  // metric = 'buts' | 'assists' | 'passes' | 'tirs' | 'minutes'
  return MATCH_DATA.map(m => ({
    j: m.j, date: m.date, adv: m.adv, lieu: m.lieu,
    gf: m.gf, ga: m.ga,
    val: (m[metric]||{})[key] || 0
  }));
}

function getFormRecente(key, n=5) {
  const last = MATCH_DATA.slice(-n);
  return {
    buts: last.reduce((s,m)=>s+(m.buts[key]||0),0),
    assists: last.reduce((s,m)=>s+(m.assists[key]||0),0),
    matches: n,
    wins: last.filter(m=>m.gf>m.ga).length,
    draws: last.filter(m=>m.gf===m.ga).length,
    losses: last.filter(m=>m.gf<m.ga).length,
  };
}

function getDomExt(key) {
  const home = MATCH_DATA.filter(m=>m.lieu==='Dom');
  const away = MATCH_DATA.filter(m=>m.lieu==='Ext');
  return {
    home_buts: home.reduce((s,m)=>s+(m.buts[key]||0),0),
    away_buts: away.reduce((s,m)=>s+(m.buts[key]||0),0),
    home_games: home.length, away_games: away.length,
    home_assists: home.reduce((s,m)=>s+(m.assists[key]||0),0),
    away_assists: away.reduce((s,m)=>s+(m.assists[key]||0),0),
  };
}

function getTrend(key) {
  const mid = Math.floor(MATCH_DATA.length/2);
  const first = MATCH_DATA.slice(0,mid);
  const second = MATCH_DATA.slice(mid);
  const g1 = first.reduce((s,m)=>s+(m.buts[key]||0),0);
  const g2 = second.reduce((s,m)=>s+(m.buts[key]||0),0);
  return { first_half: g1, second_half: g2, trend: g2>g1?'up':g2<g1?'down':'flat' };
}

/* ═══ SVG LINE CHART — évolution buts cumulés ═══ */
function evolutionChartSVG(playerKey, color='#22C55E') {
  const series = getPlayerTimeSeries(playerKey, 'buts');
  const assists = getPlayerTimeSeries(playerKey, 'assists');
  
  // Buts cumulés
  let cumG=0, cumA=0;
  const points = series.map((d,i) => {
    cumG += d.val;
    cumA += assists[i].val;
    return { j:d.j, cumG, cumA, g:d.val, a:assists[i].val, adv:d.adv, gf:d.gf, ga:d.ga };
  });
  
  const W=320, H=120, padL=28, padB=20, padT=10, padR=10;
  const maxY = Math.max(...points.map(p=>p.cumG), 3);
  const n = points.length;
  
  const px = i => padL + (i/(n-1))*(W-padL-padR);
  const pyG = v => padT + (H-padT-padB)*(1-v/maxY);
  const pyA = v => padT + (H-padT-padB)*(1-v/maxY);
  
  // Y axis labels
  const yLabels = [0, Math.round(maxY/2), maxY].map(v =>
    `<text x="${padL-4}" y="${pyG(v)+3}" text-anchor="end" font-size="8" fill="rgba(255,255,255,.4)">${v}</text>`
  ).join('');
  
  // Grid lines
  const grid = [0, Math.round(maxY/2), maxY].map(v =>
    `<line x1="${padL}" y1="${pyG(v)}" x2="${W-padR}" y2="${pyG(v)}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`
  ).join('');
  
  // Buts line
  const goalsPath = points.map((p,i) => `${i===0?'M':'L'}${px(i)},${pyG(p.cumG)}`).join(' ');
  // Assists line (dashed)
  const assistsPath = points.map((p,i) => `${i===0?'M':'L'}${px(i)},${pyA(p.cumA)}`).join(' ');
  
  // Dots + labels journée
  const dots = points.map((p,i) => `
    <circle cx="${px(i)}" cy="${pyG(p.cumG)}" r="3" fill="${color}" stroke="var(--ink)" stroke-width="1.5"/>
    <text x="${px(i)}" y="${H-4}" text-anchor="middle" font-size="7" fill="rgba(255,255,255,.35)">${p.j}</text>
    ${p.g>0?`<text x="${px(i)}" y="${pyG(p.cumG)-6}" text-anchor="middle" font-size="8" fill="${color}" font-weight="700">+${p.g}</text>`:''}
  `).join('');
  
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;margin:0 auto">
    ${grid}${yLabels}
    <path d="${assistsPath}" fill="none" stroke="rgba(59,130,246,.5)" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="${goalsPath}" fill="none" stroke="${color}" stroke-width="2"/>
    ${dots}
  </svg>`;
}

/* ═══ MINI BAR CHART — buts par match ═══ */
function perMatchBarSVG(playerKey, color='#22C55E') {
  const series = getPlayerTimeSeries(playerKey, 'buts');
  const maxV = Math.max(...series.map(d=>d.val), 1);
  const W=320, H=60, n=series.length, barW=Math.floor((W-20)/n)-2;
  
  const bars = series.map((d,i) => {
    const x = 10 + i*(barW+2);
    const h = Math.max(d.val/maxV*40, d.val>0?4:0);
    const y = 50-h;
    const col = d.gf>d.ga ? color : d.gf===d.ga ? '#F59E0B' : '#EF4444';
    return `<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="1" fill="${d.val>0?color:'rgba(255,255,255,.08)'}"/>
    ${d.val>0?`<text x="${x+barW/2}" y="${y-2}" text-anchor="middle" font-size="7" fill="${color}" font-weight="700">${d.val}</text>`:''}
    <text x="${x+barW/2}" y="58" text-anchor="middle" font-size="6" fill="rgba(255,255,255,.3)">${d.j.replace('J','')}</text>`;
  }).join('');
  
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;margin:0 auto">${bars}</svg>`;
}
