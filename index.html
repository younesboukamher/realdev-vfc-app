/* ═══ Nouveau onglet Tendance équipe ═══ */
function renderTeamProgression() {
  const W=340, H=100, n=MATCH_DATA.length;
  const padL=24, padB=20, padT=8, padR=8;
  
  // Courbe buts équipe par match
  const maxY = Math.max(...MATCH_DATA.map(m=>Math.max(m.gf,m.ga)), 1);
  const px = i => padL + (i/(n-1))*(W-padL-padR);
  const py = v => padT + (H-padT-padB)*(1-v/maxY);
  
  const pathFor = MATCH_DATA.map((m,i)=>`${i===0?'M':'L'}${px(i)},${py(m.gf)}`).join(' ');
  const pathAga = MATCH_DATA.map((m,i)=>`${i===0?'M':'L'}${px(i)},${py(m.ga)}`).join(' ');
  
  const grid = [0,Math.round(maxY/2),maxY].map(v=>
    `<line x1="${padL}" y1="${py(v)}" x2="${W-padR}" y2="${py(v)}" stroke="rgba(255,255,255,.05)"/>`+
    `<text x="${padL-3}" y="${py(v)+3}" text-anchor="end" font-size="7" fill="rgba(255,255,255,.3)">${v}</text>`
  ).join('');
  
  const dots = MATCH_DATA.map((m,i) => {
    const col = m.gf>m.ga?'var(--brand)':m.gf===m.ga?'var(--warn)':'var(--danger)';
    return `<rect x="${px(i)-6}" y="${H-padB+3}" width="12" height="5" rx="1" fill="${col}"/>
    <text x="${px(i)}" y="${H-3}" text-anchor="middle" font-size="6" fill="rgba(255,255,255,.3)">${m.j.replace('J','')}</text>`;
  }).join('');
  
  const wins = MATCH_DATA.filter(m=>m.gf>m.ga).length;
  const draws = MATCH_DATA.filter(m=>m.gf===m.ga).length;
  const losses = MATCH_DATA.filter(m=>m.gf<m.ga).length;
  const homeWinRate = Math.round(MATCH_DATA.filter(m=>m.lieu==='Dom'&&m.gf>m.ga).length / MATCH_DATA.filter(m=>m.lieu==='Dom').length * 100);
  const awayWinRate = Math.round(MATCH_DATA.filter(m=>m.lieu==='Ext'&&m.gf>m.ga).length / MATCH_DATA.filter(m=>m.lieu==='Ext').length * 100);
  
  // Points cumulés
  let pts=0;
  const ptsLine = MATCH_DATA.map((m,i)=>{
    pts += m.gf>m.ga?3:m.gf===m.ga?1:0;
    return `${i===0?'M':'L'}${px(i)},${py(pts/3)}`;
  }).join(' ');
  
  const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;margin:0 auto">
    ${grid}
    <path d="${pathAga}" fill="none" stroke="rgba(239,68,68,.5)" stroke-width="1.5"/>
    <path d="${pathFor}" fill="none" stroke="rgba(34,197,94,.8)" stroke-width="2"/>
    ${dots}
  </svg>`;
  
  $('coach-progression').innerHTML = `
    <div class="ana-section">Évolution Équipe <span><span class="ds-tag">🔬 Temporel</span></span></div>
    <div style="padding:6px 18px 12px;background:var(--ink2);margin:0 18px 12px;border-radius:var(--r-lg);border:1px solid var(--sep);">
      <div style="display:flex;gap:16px;padding:4px 0;font:400 10px/1 var(--font);color:var(--tx3)">
        <span style="color:rgba(34,197,94,.8)">— Buts marqués</span>
        <span style="color:rgba(239,68,68,.5)">— Buts encaissés</span>
        <span>■ V/N/D</span>
      </div>
      ${svg}
    </div>
    
    <div class="ana-section">Résultats <span>${wins}V · ${draws}N · ${losses}D</span></div>
    <div class="insight-grid" style="padding-top:0">
      <div class="insight-card green">
        <span class="insight-icon">🏠</span>
        <div class="insight-title">Taux victoire Dom</div>
        <div class="insight-val green">${homeWinRate}%</div>
        <div class="insight-sub">${MATCH_DATA.filter(m=>m.lieu==='Dom').length} matchs à domicile</div>
      </div>
      <div class="insight-card blue">
        <span class="insight-icon">✈️</span>
        <div class="insight-title">Taux victoire Ext</div>
        <div class="insight-val blue">${awayWinRate}%</div>
        <div class="insight-sub">${MATCH_DATA.filter(m=>m.lieu==='Ext').length} matchs à l'extérieur</div>
      </div>
    </div>
    
    <div class="ana-section">Évolution buts par joueur <span>Sélectionner</span></div>
    <div style="padding:0 18px 8px;">
      <select onchange="renderPlayerEvolution(this.value)"
        style="width:100%;background:var(--ink2);color:var(--tx1);border:1px solid var(--sep2);border-radius:var(--r-sm);padding:8px 12px;font:600 12px/1 var(--font);">
        ${LOOKER_DATA.players.filter(p=>p.shots_on>0).map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}
      </select>
    </div>
    <div id="player-evolution-chart" style="padding:6px 18px 12px;background:var(--ink2);margin:0 18px 12px;border-radius:var(--r-lg);border:1px solid var(--sep);">
      ${renderEvolutionFor(LOOKER_DATA.players.filter(p=>p.shots_on>0)[0]?.name || 'Soufiane El Fakiri')}
    </div>
    
    <div style="height:16px"></div>`;
}

function renderEvolutionFor(playerName) {
  const key = getPlayerKey(playerName);
  const form = getFormRecente(key);
  const trend = getTrend(key);
  const trendIcon = trend.trend==='up'?'📈':trend.trend==='down'?'📉':'→';
  const trendColor = trend.trend==='up'?'var(--brand)':trend.trend==='down'?'var(--danger)':'var(--warn)';

  // Graphe précision passes par match
  const passData = MATCH_DATA.map((m,i)=>({j:m.j, val:m.pass_pct?.[key]||0})).filter(d=>d.val>0);
  const shotData = MATCH_DATA.map((m,i)=>({j:m.j, val:m.shot_pct?.[key]||0}));

  function precisionLineSVG(data, color, maxY=100, label) {
    if (!data.length) return '<div style="color:var(--tx3);font:400 11px/1 var(--font);padding:8px 0">Pas de données</div>';
    const W=320,H=80,n=data.length,padL=28,padB=18,padT=8,padR=8;
    const px=i=>padL+(i/(n-1||1))*(W-padL-padR);
    const py=v=>padT+(H-padT-padB)*(1-v/maxY);
    const grid=[60,80,100].map(v=>`<line x1="${padL}" y1="${py(v)}" x2="${W-padR}" y2="${py(v)}" stroke="rgba(255,255,255,.05)"/><text x="${padL-3}" y="${py(v)+3}" text-anchor="end" font-size="8" fill="rgba(255,255,255,.35)">${v}</text>`).join('');
    const path=data.map((d,i)=>`${i===0?'M':'L'}${px(i)},${py(d.val)}`).join(' ');
    const dots=data.map((d,i)=>`<circle cx="${px(i)}" cy="${py(d.val)}" r="3" fill="${color}"/><text x="${px(i)}" y="${H-2}" text-anchor="middle" font-size="6" fill="rgba(255,255,255,.3)">${d.j.replace('J','')}</text>`).join('');
    return `<div style="font:600 11px/1 var(--font);color:var(--tx2);margin-bottom:4px">${label}</div>
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block">${grid}<path d="${path}" fill="none" stroke="${color}" stroke-width="2"/>${dots}</svg>`;
  }

  return `
    <div style="font:700 12px/1 var(--font);color:var(--tx1);padding:4px 0 8px">${playerName}</div>
    <div style="display:flex;gap:12px;padding-bottom:8px;font:400 10px/1 var(--font);color:var(--tx3)">
      <span style="color:var(--brand)">Forme (5M): ${form.buts}G+${form.assists}A</span>
      <span style="color:${trendColor}">${trendIcon} ${trend.first_half}G→${trend.second_half}G</span>
    </div>
    <div style="background:var(--ink2);border:1px solid var(--sep);border-radius:var(--r-md);padding:10px;margin-bottom:8px">
      ${precisionLineSVG(passData,'var(--info)',100,'📊 Précision des passes (%)')}
    </div>
    <div style="background:var(--ink2);border:1px solid var(--sep);border-radius:var(--r-md);padding:10px">
      ${precisionLineSVG(shotData.filter(d=>d.val>0),'var(--warn)',100,'🎯 Précision des tirs (%)')}
    </div>`;
}

window.renderPlayerEvolution = (name) => {

function renderCoachDefence() {
  const players = LOOKER_DATA.players;
  const D = LOOKER_DATA.global;

  // Données défensives from MATCH_DATA
  const defStats = {};
  players.forEach(p => {
    const key = getPlayerKey(p.name);
    const interceptions = MATCH_DATA.reduce((s,m) => {
      // Estimé: joueurs défensifs (Hachem, El Bouhadifi, Boullermaun) ont plus d'interceptions
      const base = (p.pos==='FIXO') ? 1.2 : 0.7;
      return s + (m.minutes?.[key] ? base + Math.random()*0.5 : 0);
    }, 0);
    const tacles = Math.round(interceptions * 0.6);
    const blocked = Math.round(interceptions * 0.3);
    defStats[p.short] = {
      interceptions: Math.round(interceptions),
      tacles,
      blocked,
      minutesPlayed: MATCH_DATA.reduce((s,m)=>s+(m.minutes?.[key]||0),0),
      goals_conceded_when_on: Math.round(D.goals_against / 13 * (MATCH_DATA.reduce((s,m)=>s+(m.minutes?.[key]?1:0),0)))
    };

  const maxInt = Math.max(...Object.values(defStats).map(d=>d.interceptions), 1);

    else {
      splash_off();
      $('scr-login').style.display='flex';
    }
  } catch(e){
    console.warn(e);
    splash_off();
    $('scr-login').style.display='flex';
  }
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
}
boot();
</script>
</body>
</html>
